# The URL the site will be built for
base_url = "https://blog.linyinfeng.com"
title = "Yinfeng's"
description = "Yinfeng's Blog"

default_language = "zh-CN"

# Generate RSS
generate_feeds = true
feed_filenames = ["atom.xml", "rss.xml"]

compile_sass = true

# Whether to build a search index to be used later on by a JavaScript library
# build_search_index = true

taxonomies = [
    { name = "tags" },
    { name = "categories" },
]

[translations]
languages = "语言"
this_language = "简体中文"
table_of_contents = "目录"
continue_reading = "继续阅读……"
about = "关于"
archive = "归档"
links = "链接"
tags = "标签"
categories = "类别"
created = "创建"
updated = "更新"

[languages.en-US]
title = "Yinfeng's"
description = "Yinfeng's Blog"
generate_feeds = true
taxonomies = [
    { name = "tags" },
    { name = "categories" },
]

[languages.en-US.translations]
languages = "Languages"
this_language = "English (US)"
table_of_contents = "Table of Contents"
continue_reading = "Continue reading..."
about = "About"
archive = "Archive"
links = "Links"
tags = "Tags"
categories = "Categories"
created = "created"
updated = "updated"

[markdown.highlighting]
error_on_missing_language = true
theme = "github-light-default"
# TODO dual theming
# light_theme = "github-light"
# dark_theme = "github-dark"

[extra]
# Header settings
global_nav_items = [
    { key = "archive", path = "archive" },
    { key = "links", path = "links" },
    { key = "about", path = "about" },
]

# Footer settings
copyright = "© [Yinfeng](https://github.com/linyinfeng)"
powered_by = "Powered by [Zola](https://www.getzola.org)"

index_aside_taxonomies = [
    { name = "categories" },
    { name = "tags" },
]

# Text settings
text_continue_reading = "Continue reading..."
text_draft = "Draft"

date_format = "%Y-%m-%d %H:%M"

# KaTeX
[extra.katex]
enable = true
render_options = '''
{
    macros: {
        "\\set": "\\left\\{ #1 \\right\\}"
    },
    delimiters: [
        {left: "$$",  right: "$$",  display: true },
        {left: "$",   right: "$",   display: false},
        {left: "\\(", right: "\\)", display: false},
        {left: "\\[", right: "\\]", display: true }
    ]
}
'''

# Google Tag Manager
[extra.google_tag_manager]
enable = true
code = "GTM-K74P2G7"

# Giscus
[extra.giscus]
enable = true
repo = "linyinfeng/blog"
repo_id = "MDEwOlJlcG9zaXRvcnkxNDMxMjU5NTA="
category_id = "MDE4OkRpc2N1c3Npb25DYXRlZ29yeTMyOTkyOTcy"
reactions_enabled="1"
theme="light"

# Mastodon
[extra.mastodon]
enable = true
link = "https://mastodon.li7g.com/@yinfeng"

[extra.open_graph]
enable = true
default_image = "default-open-graph-image.png"
